# Gate for `main`: every PR must pass typecheck, lint, and tests before it
# can merge (enforced by branch protection). Tests need a real Postgres —
# the vitest global-setup creates a throwaway DB and runs migrations — so a
# postgres service is provided here.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # global-setup connects to the admin `postgres` db to create this one.
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/peakstreak_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm --filter web test
